<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Station météo ESP32</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
    }
    h1 {
      margin-bottom: 10px;
    }
    .card {
      background: #111827;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      max-width: 420px;
      width: 100%;
    }
    .row {
      display: flex;
      justify-content: space-between;
      margin: 6px 0;
    }
    .label {
      color: #9ca3af;
    }
    .value {
      font-weight: 600;
    }
    #error {
      margin-top: 15px;
      color: #f97373;
      font-size: 0.9rem;
    }
    #updated {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #9ca3af;
      text-align: right;
    }
  </style>
</head>
<body>
  <h1>Station météo ESP32</h1>

  <div class="card">
    <div class="row">
      <span class="label">Ville</span>
      <span class="value" id="ville">-</span>
    </div>
    <div class="row">
      <span class="label">Température</span>
      <span class="value" id="temp">-</span>
    </div>
    <div class="row">
      <span class="label">Humidité</span>
      <span class="value" id="hum">-</span>
    </div>
    <div class="row">
      <span class="label">Pression</span>
      <span class="value" id="press">-</span>
    </div>
    <div class="row">
      <span class="label">Vent</span>
      <span class="value" id="vent">-</span>
    </div>
    <div class="row">
      <span class="label">Ciel</span>
      <span class="value" id="desc">-</span>
    </div>

    <div id="updated"></div>
    <div id="error"></div>
  </div>

  <!-- ========================= -->
  <!--   JAVASCRIPT INTÉGRÉ     -->
  <!-- ========================= -->
  <script>
    async function chargerMeteo() {
      try {
        const res = await fetch("/api/meteo");
        if (!res.ok) {
          document.getElementById("error").textContent =
            "Erreur " + res.status + " : " + res.statusText;
          return;
        }

        const data = await res.json();

        document.getElementById("ville").textContent = data.name || "-";
        document.getElementById("temp").textContent =
          (data.main?.temp ?? "-") + " °C";
        document.getElementById("hum").textContent =
          (data.main?.humidity ?? "-") + " %";
        document.getElementById("press").textContent =
          (data.main?.pressure ?? "-") + " hPa";
        document.getElementById("vent").textContent =
          (data.wind?.speed ?? "-") + " km/h";
        document.getElementById("desc").textContent =
          (data.weather && data.weather[0]?.description) || "-";

        const now = new Date();
        document.getElementById("updated").textContent =
          "Dernière mise à jour : " +
          now.toLocaleTimeString("fr-CA", {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
          });

        document.getElementById("error").textContent = "";
      } catch (e) {
        document.getElementById("error").textContent =
          "Erreur réseau : " + e.message;
      }
    }

    chargerMeteo();
    setInterval(chargerMeteo, 15000);
  </script>

</body>
</html>
